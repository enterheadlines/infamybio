<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>infamy.</title>
    <link rel="icon" href="https://entertopia.vercel.app/imgs/skibiditoiletrizz.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');

        /* Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none !important; /* Hide default cursor everywhere */
            user-select: none;
            font-family: 'Inter', sans-serif;
        }

        body, html {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: #050505;
            color: #ffffff;
        }

        /* Dynamic Background */
        .bg-element {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            animation: float 20s infinite alternate cubic-bezier(0.5, 0, 0.5, 1);
        }
        .bg-1 { width: 40vw; height: 40vw; background: #ff005533; top: -10%; left: -10%; }
        .bg-2 { width: 50vw; height: 50vw; background: #4000ff33; bottom: -20%; right: -10%; animation-delay: -5s; }
        .bg-3 { width: 30vw; height: 30vw; background: #00f2fe22; top: 40%; left: 40%; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10vw, 15vh) scale(1.2); }
        }

        /* Entrance Overlay */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 1.5s cubic-bezier(0.77, 0, 0.175, 1), transform 1.5s cubic-bezier(0.77, 0, 0.175, 1);
        }

        #enter-text {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.5em;
            color: #fff;
            padding: 20px 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        #enter-text::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s ease;
            z-index: -1;
        }

        #enter-text:hover {
            color: #000;
            border-color: #fff;
            transform: scale(1.05);
        }

        #enter-text:hover::before {
            transform: scaleX(1);
            transform-origin: left;
        }

        /* Main Content Grid */
        .content {
            display: none; /* Handled by JS */
            height: 100%;
            width: 100%;
            align-items: center;
            justify-content: center;
            perspective: 1000px; /* For 3D tilt */
        }

        .profile-card {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 50px 40px;
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            opacity: 0;
            transform: translateY(40px);
            animation: revealUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: transform 0.1s ease-out; /* For JS tilt */
            transform-style: preserve-3d;
        }

        @keyframes revealUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Profile Elements */
        #profile-pic {
            border-radius: 50%;
            width: 120px;
            height: 120px;
            object-fit: cover;
            margin-bottom: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            transform: translateZ(30px); /* 3D pop */
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #profile-pic:hover {
            transform: translateZ(50px) scale(1.1);
        }

        #username {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -0.03em;
            margin-bottom: 5px;
            background: linear-gradient(120deg, #ffffff, #a8a8a8, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
            transform: translateZ(20px);
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .subtitle {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #888;
            margin-bottom: 30px;
            transform: translateZ(10px);
        }

        .section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #555;
            margin: 20px 0 10px 0;
            width: 100%;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 5px;
        }

        /* Links */
        .links-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-start;
            width: 100%;
            transform: translateZ(15px);
        }

        .link {
            text-decoration: none;
            color: #ccc;
            font-size: 0.9rem;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .link:hover {
            background: #ffffff;
            color: #000000;
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
            font-weight: 700;
        }

        /* Audio Control */
        .volume-container {
            margin-top: 40px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            transform: translateZ(10px);
        }

        .volume-label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        #volume-control {
            flex-grow: 1;
            -webkit-appearance: none;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            outline: none;
        }

        #volume-control::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #ffffff;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        #volume-control::-webkit-slider-thumb:hover {
            transform: scale(1.5);
        }

        /* Advanced Custom Cursor */
        .cursor-dot {
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }

        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, background 0.2s;
        }

        /* Link hover effect for cursor */
        .cursor-hover .cursor-outline {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border-color: transparent;
        }
    </style>
</head>
<body>

    <!-- Animated Background Elements -->
    <div class="bg-element bg-1"></div>
    <div class="bg-element bg-2"></div>
    <div class="bg-element bg-3"></div>

    <!-- Custom Cursor Elements -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <div id="overlay">
        <div id="enter-text">ENTER</div>
    </div>

    <div class="content">
        <div class="profile-card" id="card">
            <img src="infamy.webp" alt="Profile Picture" id="profile-pic" onerror="this.src='https://via.placeholder.com/120/1a1a1a/ffffff?text=I'">
            <h1 id="username">Infamy.</h1>
            <p class="subtitle">Frontend Developer</p>
            
            <div class="section-label">Projects</div>
            <div class="links-grid">
                <a href="https://starlighttt.netlify.app" class="link">Starlight</a>
                <a href="https://entertopia.vercel.app" class="link">Entertopia</a>
                <a href="https://js-terminall.netlify.app/" class="link">JS Terminal</a>
            </div>
            
            <div class="section-label">Socials</div>
            <div class="links-grid">
                <a href="https://www.youtube.com/@erdhle" class="link">YouTube</a>
                <a href="https://tiktok.com/@enterheadlines" class="link">TikTok</a>
                <a href="https://github.com/enterheadlines" class="link">GitHub</a>
                <a href="https://www.instagram.com/infamy__studios/" class="link">Instagram</a>
                <a href="https://www.x.com/enterheadlines_/" class="link">Twitter</a>
                <a href="https://www.snapchat.com/add/enterheadlines" class="link">Snapchat</a>
            </div>

            <div class="volume-container">
                <span class="volume-label">Audio</span>
                <input type="range" id="volume-control" min="0" max="1" step="0.01" value="1">
            </div>
        </div>
        <audio id="bg-music" src="musicc.mp3" loop></audio>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // -- Entrance Logic --
            const overlay = document.getElementById('overlay');
            const content = document.querySelector('.content');
            const bgMusic = document.getElementById('bg-music');
            const volumeControl = document.getElementById('volume-control');

            overlay.addEventListener('click', () => {
                overlay.style.transform = 'scale(1.1)';
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    content.style.display = 'flex';
                    bgMusic.play().catch(e => console.log("Audio play blocked until interaction."));
                }, 800); // Wait for transition
            });

            volumeControl.addEventListener('input', (e) => {
                bgMusic.volume = e.target.value;
            });

            // -- Advanced Custom Cursor Logic --
            const cursorDot = document.querySelector('.cursor-dot');
            const cursorOutline = document.querySelector('.cursor-outline');
            
            let mouseX = 0;
            let mouseY = 0;
            let outlineX = 0;
            let outlineY = 0;

            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                // Instant follow for the dot
                cursorDot.style.left = `${mouseX}px`;
                cursorDot.style.top = `${mouseY}px`;
            });

            // Smooth trailing effect for the outline using requestAnimationFrame
            const animateCursor = () => {
                let distX = mouseX - outlineX;
                let distY = mouseY - outlineY;
                
                // Speed of the trailing effect (0.15 is smooth)
                outlineX = outlineX + (distX * 0.15);
                outlineY = outlineY + (distY * 0.15);

                cursorOutline.style.left = `${outlineX}px`;
                cursorOutline.style.top = `${outlineY}px`;

                requestAnimationFrame(animateCursor);
            };
            animateCursor();

            // Hover interactions for cursor
            const interactiveElements = document.querySelectorAll('a, #enter-text, input, #profile-pic');
            interactiveElements.forEach(el => {
                el.addEventListener('mouseenter', () => {
                    document.body.classList.add('cursor-hover');
                });
                el.addEventListener('mouseleave', () => {
                    document.body.classList.remove('cursor-hover');
                });
            });

            // -- 3D Tilt Effect on Profile Card --
            const card = document.getElementById('card');
            
            document.addEventListener('mousemove', (e) => {
                // Only apply tilt if the card is visible
                if(content.style.display !== 'flex') return;

                const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });

            // Reset tilt when mouse leaves window
            document.addEventListener('mouseleave', () => {
                card.style.transform = `rotateY(0deg) rotateX(0deg)`;
                card.style.transition = `transform 0.5s ease`;
            });
            
            document.addEventListener('mouseenter', () => {
                card.style.transition = `transform 0.1s ease-out`;
            });
        });
    </script>
</body>
</html>
